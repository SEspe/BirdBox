name: Build & Release (ESP-IDF)

on:
  push:
    branches: ['**']   # every push builds (open-source posture, FSD §9)
    tags:
      - 'v*'           # e.g. v1.0.0 → builds both targets + GitHub Release

env:
  IDF_VERSION: v6.0.1   # pin ESP-IDF version

jobs:
  build-esp32s3:
    name: Build BirdBox (ESP32-S3, primary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: esp32s3
          path: .
          command: idf.py build

      - name: Extract version & rename bin
        run: |
          VER=$(grep 'FIRMWARE_VERSION' main/version.h | grep -oP '"[^"]+"' | tr -d '"')
          cp build/BirdBox.bin BirdBox_esp32s3_v${VER}.bin
          echo "BIN=BirdBox_esp32s3_v${VER}.bin" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: BirdBox-esp32s3
          path: ${{ env.BIN }}

  build-esp32:
    name: Build BirdBox (ESP32, constrained)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: esp32
          path: .
          command: idf.py build

      - name: Extract version & rename bin
        run: |
          VER=$(grep 'FIRMWARE_VERSION' main/version.h | grep -oP '"[^"]+"' | tr -d '"')
          cp build/BirdBox.bin BirdBox_esp32_v${VER}.bin
          echo "BIN=BirdBox_esp32_v${VER}.bin" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: BirdBox-esp32
          path: ${{ env.BIN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-esp32s3, build-esp32]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## BirdBox Firmware ${{ github.ref_name }}

            Built with ESP-IDF ${{ env.IDF_VERSION }}.
            `BirdBox_esp32s3_*.bin` — primary target (full species ID).
            `BirdBox_esp32_*.bin` — AI-Thinker ESP32-CAM (no species ID, see FSD §3.2).

            ### Update via OTA
            1. Open device web UI → **OTA Update** tab
            2. Select the `.bin` for your board
            3. Click **Upload & Flash**

            ### First flash via USB
            ```
            idf.py set-target esp32s3 && idf.py -p COMx flash
            ```
          files: artifacts/*.bin
          fail_on_unmatched_files: false
